name: CI Pipeline

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python Syntax
        run: |
          python -m compileall src app frontend_streamlit

      - name: Check Code Formatting
        run: |
          black --check src app frontend_streamlit

      - name: Check Import Sorting
        run: |
          python -m isort --profile black --check-only src app frontend_streamlit


      - name: Lint Code
        run: |
          flake8 src app frontend_streamlit

      